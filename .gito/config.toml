# Gito project configuration for RalphHarness

# Exclude patterns — files that should NOT be reviewed
exclude_files = [
    # Hidden files and directories (dotfiles)
    ".*",
    ".*/**",

    # Files/directories starting with underscore
    "_*",
    "_*/**",

    # Specs directory (planning artifacts, not production code)
    "specs/**",

    # Plans directory
    "plans/**",

    # Research directory
    "research/**",

    # BMAD output
    "_bmad-output/**",

    # Temporary directories
    "tmp.*/**",

    # Lock files
    "*.lock",

    # Generated files
    "**/.gitkeep",
]

# Context files to provide alongside reviews
aux_files = [
    "AGENTS.md",
    "CLAUDE.md",
    "README.md",
    "docs/ARCHITECTURE.md",
    "docs/ENGINE_ROADMAP.md",
    ".gito/context.md",
]

# PR comment triggers
mention_triggers = ["gito", "/review", "/check"]
collapse_previous_code_review_comments = true

# Custom review instructions — provides project-specific context
[prompt_vars]
requirements = """
- This is the Smart Ralph project: a Claude Code plugin for spec-driven development
- Smart Ralph transforms feature requests into structured specs (research, requirements, design, tasks) then executes them task-by-task
- Key principles: SPEC FIRST, POC BEFORE TESTS, VERIFY EVERY TASK, NO MERGE WITHOUT REVIEW
- Follow existing patterns in the codebase — do not refactor adjacent code
- All plugin files are markdown-based (commands, agents, hooks, skills)
- For plugins: use plugin.json manifest, follow Claude Code plugin conventions
- For specs: use specs/<name>/tasks.md with done-when + verify commands
- Never commit directly to main — always PR

[PRE-EXECUTION-CRITIC CONTEXT — spec/pre-execution-critic → main]
Branch: spec/pre-execution-critic (PR #20)
Goal: Add 3-layer pre-execution security critic (role-contract + shell-pattern + risk classifier) with exit-code contract (0=allow, 2=block/confirm, other=UNKNOWN)

INTENTIONAL PATTERNS (NOT BUGS — DO NOT FLAG):
- Layer 1 (role-contract) ALWAYS short-circuits before Layer 2/3 — this is by design, path-based veto is the core security model
- Exit code contract: 0=allow, 2=block-or-confirm, other non-zero = fail-safe confirm — no other exit codes used
- signals.jsonl contains comment lines (starting with #); replay-signals.sh strips them with grep -v '^#' before jq — this is NOT a bug
- pre-execution-check.sh is a bash script (~607 lines), NOT a Claude Code subagent
- All edits to existing files are APPEND-ONLY (new sections, new table rows)
- No new subagent_type entries — only bash hooks and test files
- Version bump 5.3.0 → 5.4.0 is mandatory per CLAUDE.md version-bump mandate
- Fixture path docs/guide.md is intentionally outside spec-executor Writes set for the "outside Writes" test
- securityDecisionEvent schema adds path and command as nullable fields
- Append-only signals.jsonl: resolution via new event, never deletion or in-place edit

KNOWN TRUE ISSUES (ALREADY FIXED, DO NOT FLAG AGAIN):
#1 local keyword used outside function (fixed in 1.18)
#2 iteration used before initialization (fixed in 1.18)
#3 lib-signals.sh sourced after append_signal usage (fixed in 1.18)
#4 exit called inside subshell (fixed in 1.18)
#5 Missing stdout verdict output on non-block path (fixed in 1.18)
#6 4 bats tests missing --spec-path argument (fixed, caused reviewer DEADLOCK)
#7 replay-signals.sh failing on comment lines (grep -v '^#' fix)
#8 "outside Writes" test path src/index.ts was in-bounds (changed to docs/guide.md)

REVIEW FOCUS: Flag ONLY genuine issues in pre-execution-check.sh logic, exit codes, shell patterns, and test coverage. Do not flag intentional patterns listed above. Do not flag spec planning documents in specs/.
"""

# Summary-specific requirements
summary_requirements = """
- Evaluate if the code aligns with Smart Ralph's spec-driven workflow
- Check for consistency with existing patterns (markdown commands, agent system prompts, hooks)
- Verify architectural decisions match the epic goals
"""

# Additional context injected into the system prompt
awards = ""
